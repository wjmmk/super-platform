<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% if title %}
            FastAPI Blog - {{ title }}
        {% else %}
            FastAPI Blog
        {% endif%}
    </title>
</head>
<body>
    <h1>Paginas web desde FastAPI.</h1>
    
    {% for post in posts %}
        <h2>{{ post.title }}</h2>
        <p>{{ post.content }}</p>
    {% endfor %}
</body>
</html>
